name: Render QMD to HTML and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'HDS_04_YuChungYan_2604.qmd'
      - 'scripts/**'
      - 'references.bib'
      - 'nature.csl'
      - 'data/**'
      - 'environment.yml'
      - '.github/workflows/render-qmd.yml'
      - 'poster/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Mamba
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          environment-file: environment.yml
          activate-environment: cytotoxcore
          use-mamba: true
          cache-environment: true
          cache-environment-key: conda-${{ hashFiles('environment.yml') }}

      - name: Cache R library
        uses: actions/cache@v4
        with:
          path: /home/runner/miniconda3/envs/cytotoxcore/lib/R/library
          key: r-lib-${{ hashFiles('environment.yml') }}

      - name: Install Bioconductor packages
        run: |
          Rscript -e 'if (!requireNamespace("cBioPortalData", quietly=TRUE) || !requireNamespace("GEOquery", quietly=TRUE)) { options(repos = c(CRAN = "https://cloud.r-project.org")); if (!require("BiocManager")) install.packages("BiocManager"); BiocManager::install(c("cBioPortalData", "GEOquery"), ask = FALSE, update = FALSE) } else { message("Bioconductor packages already cached") }'

      - name: Render QMD to HTML
        run: quarto render HDS_04_YuChungYan_2604.qmd

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
